name: Build farm tool spike

on:
  workflow_dispatch:

jobs:
  rubygems-build-binary:
    if: false
    runs-on: ubuntu-24.04

    steps:
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - name: Print environment
        run: |
          ruby -v
          gem -v
          gem env
      
      - name: Install rubygems-build-binary
        run: gem install rubygems-build-binary

      - name: Fetch source gems
        run: |
          mkdir -p source
          cd source
          gem fetch json --platform ruby
          gem fetch nokogiri --platform ruby
          gem fetch eventmachine --platform ruby
          gem fetch unicorn --platform ruby
          gem fetch ffi --platform ruby
          ls -lh

      - name: Build binary gems
        run: |
          mkdir -p built/build_binary logs
          cd built/build_binary

          for file in ../../source/*.gem; do
            gem_name="$(basename "$file" .gem)"
            echo "Building $gem_name"
            gem build_binary "$file" 2>&1 | tee "../../logs/build_binary-${gem_name}.log"
          done

          ls -lh
        
      - name: Verify built gems
        run: |
          mkdir -p verify

          for file in built/build_binary/*.gem; do
            echo "installing $file"
            gem install "$file" --install-dir verify --no-document
          done

          export GEM_HOME="$PWD/verify"
          export GEM_PATH="$PWD/verify"

          ruby -rjson -e 'puts "json ok"'
          ruby -rnokogiri -e 'puts "nokogiri ok"'
          ruby -reventmachine -e 'puts "eventmachine ok"'
          ruby -runicorn -e 'puts "unicorn ok"'
          ruby -rffi -e 'puts "ffi ok"'
      
      - name: Upload rubygems-build-binary results
        uses: actions/upload-artifact@v4
        with:
          name: rubygems-build-binary-results
          path: |
            built/build_binary/*.gem
            logs/*.log

  cibuildgem:
    runs-on: ubuntu-24.04

    steps:
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - name: Print environment
        run: |
          ruby -v
          gem -v
          gem env

      - name: Clone rubydex source
        run: |
          git clone https://github.com/Shopify/rubydex.git gems/rubydex
          cd gems/rubydex
          ls -lh
          ls *.gemspec

      - name: Install rubydex repo dependencies
        run: |
          cd gems/rubydex
          bundle install

      - name: Install cargo-about
        run: cargo install cargo-about --features cli

      - name: Run cibuildgem
        uses: shopify/cibuildgem/.github/actions/cibuildgem@main
        with:
          working-directory: gems/rubydex
          step: compile

      - name: Print cibuildgem outputs
        if: always()
        run: |
          cd gems/rubydex
          echo "Gem files:"
          find pkg -name "*.gem" -print || true
          echo "Compiled files:"
          find tmp -type f \( -name "*.so" -o -name "*.bundle" -o -name "*.dll" \) -print || true

      - name: Upload cibuildgem outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cibuildgem-debug-results
          path: |
            gems/rubydex/pkg/*.gem
            gems/rubydex/tmp/**/*.so
            gems/rubydex/tmp/**/*.bundle
          if-no-files-found: ignore
