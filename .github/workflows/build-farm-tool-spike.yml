name: Build farm tool spike

on:
  workflow_dispatch:

jobs:
  rubygems-build-binary:
    runs-on: ubuntu-24.04
    container: rubylang/ruby:4.0.0-noble

    steps:
      - name: Print environment
        run: |
          ruby -v
          gem -v
          gem env

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y clang cmake curl g++ gcc libpq-dev libssl-dev llvm make meson ninja-build pkg-config rustup zlib1g-dev
      
      - name: Install rubygems-build-binary
        run: gem install rubygems-build-binary

      - name: Fetch source gems
        run: |
          mkdir -p source
          cd source
          gem fetch pg --platform ruby
          ls -lh

      - name: Build binary gems
        run: |
          mkdir -p built/build_binary logs
          cd built/build_binary

          for file in ../../source/*.gem; do
            gem_name="$(basename "$file" .gem)"
            echo "Building $gem_name"
            gem build_binary "$file" 2>&1 | tee "../../logs/build_binary-${gem_name}.log"
          done

          ls -lh
        
      - name: Verify built gems
        run: |
          mkdir -p verify

          for file in built/build_binary/*.gem; do
            echo "installing $file"
            gem install "$file" --install-dir verify --no-document
          done

          export GEM_HOME="$PWD/verify"
          export GEM_PATH="$PWD/verify"

          ruby -rpg -e 'puts "pg ok"'
      
      - name: Upload rubygems-build-binary results
        uses: actions/upload-artifact@v4
        with:
          name: rubygems-build-binary-results
          path: |
            built/build_binary/*.gem
            logs/*.log

  cibuildgem:
    if: false
    runs-on: ubuntu-24.04

    steps:
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - name: Print environment
        run: |
          ruby -v
          gem -v
          gem env

      - name: Clone eventmachine source
        run: |
          git clone https://github.com/eventmachine/eventmachine.git gems/eventmachine
          cd gems/eventmachine
          ls -lh
          ls *.gemspec

      - name: Install eventmachine repo dependencies
        run: |
          cd gems/eventmachine
          bundle install

      - name: Run cibuildgem
        uses: shopify/cibuildgem/.github/actions/cibuildgem@main
        with:
          working-directory: gems/eventmachine
          step: compile

      - name: Print cibuildgem outputs
        if: always()
        run: |
          cd gems/eventmachine
          echo "Gem files:"
          find pkg -name "*.gem" -print || true
          echo "Compiled files:"
          find tmp -type f \( -name "*.so" -o -name "*.bundle" -o -name "*.dll" \) -print || true

      - name: Upload cibuildgem outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cibuildgem-debug-results
          path: |
            gems/eventmachine/pkg/*.gem
            gems/eventmachine/tmp/**/*.so
            gems/eventmachine/tmp/**/*.bundle
          if-no-files-found: ignore

  repro-missing-system-lib:
    runs-on: ubuntu-24.04
    container: rubylang/ruby:4.0.0-noble
    needs: rubygems-build-binary

    steps:
      - name: Check environment and existing shared libraries
        run: |
          ruby -v
          gem -v
          ldconfig -p | grep -E 'libpq|libffi|libssl|libcrypto|libz' || true
      
      - name: Download built gems
        uses: actions/download-artifact@v4
        with:
          name: rubygems-build-binary-results
          path: built-gems
      
      - name: Show downloaded files
        run: |
          find built-gems -type f -print
      
      - name: Inspect pg binary dependencies
        run: |
          pg_gem="$(find built-gems -name 'pg-*-x86_64-linux.gem' | head -n 1)"
          echo "Inspecting $pg_gem"
          mkdir -p unpacked-pg
          tar -xf "$pg_gem" -C unpacked-pg data.tar.gz
          tar -xzf unpacked-pg/data.tar.gz -C unpacked-pg
          find unpacked-pg -name "*.so" -print
          pg_so="$(find unpacked-pg -name 'pg_ext.so' | head -n 1)"
          ldd "$pg_so" || true

      - name: Install and require pg
        run: |
          pg_gem="$(find built-gems -name 'pg-*-x86_64-linux.gem' | head -n 1)"
          gem install "$pg_gem" --local --no-document
          ruby -rpg -e 'puts "pg ok"'
